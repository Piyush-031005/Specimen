<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050505" />
    <title>SPECIMEN</title>
    <meta name="description" content="An encounter with an unknown presence. Reality emerges through communication." />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><circle cx=%2250%22 cy=%2250%22 r=%2250%22 fill=%22%23f5f0e8%22/></svg>">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=IBM+Plex+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />

    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000000;
        font-family: 'Inter', system-ui, sans-serif;
        color: #f5f0e8;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }

      #canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
      }


      /* AAA SCI-FI UI/UX */
      #specimen-hud {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        z-index: 100;
        font-family: 'IBM Plex Mono', monospace;
        color: rgba(0, 255, 255, 0.8);
        text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        font-size: 11px;
        letter-spacing: 3px;
        transition: all 0.5s ease;
      }

      /* CRT Scanlines & Vignette */
      .scanlines {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
        background-size: 100% 3px, 3px 100%;
        box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
        z-index: -1;
      }

      /* Glassmorphism Panels */
      .hud-panel {
        position: absolute;
        background: rgba(0, 10, 20, 0.4);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(0, 255, 255, 0.2);
        padding: 20px;
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        border-radius: 4px;
        clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
      }

      .hud-top-left { top: 40px; left: 40px; width: 300px; border-left: 3px solid rgba(0, 255, 255, 0.8); }
      .hud-title { font-weight: bold; margin-bottom: 8px; font-size: 16px; letter-spacing: 5px; color: #fff; text-shadow: 0 0 15px rgba(0, 255, 255, 0.8); }
      .hud-status { opacity: 0.9; color: #0f0; text-shadow: 0 0 10px #0f0; font-weight: bold; }
      
      .hud-top-right { top: 40px; right: 40px; text-align: right; border-right: 3px solid rgba(0, 255, 255, 0.8); }
      .hud-top-right div { margin-bottom: 5px; font-size: 10px; }
      
      .hud-bottom-left { bottom: 40px; left: 40px; width: 300px; font-size: 9px; opacity: 0.8; }
      .hud-bottom-left .log-header { font-weight: bold; border-bottom: 1px solid rgba(0,255,255,0.3); padding-bottom: 5px; margin-bottom: 5px; }
      .hud-log div { margin-top: 4px; animation: glitchText 0.2s infinite alternate; }
      
      /* Central Targeting Rings */
      .targeting-ring {
        position: absolute;
        top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        border: 1px dashed rgba(0, 255, 255, 0.2);
        border-radius: 50%;
        animation: rotateRing 20s linear infinite;
      }
      .ring-1 { width: 400px; height: 400px; border-style: dotted; animation-direction: reverse; animation-duration: 30s;}
      .ring-2 { width: 300px; height: 300px; border-style: dashed; border-color: rgba(255, 50, 50, 0.15);}
      
      @keyframes rotateRing { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
      @keyframes glitchText { 0% { opacity: 0.8; } 100% { opacity: 1; transform: translateX(1px); } }

      #specimen-hud.danger {
        color: rgba(255, 50, 50, 0.9);
        text-shadow: 0 0 15px rgba(255, 50, 50, 0.8);
      }
      #specimen-hud.danger .hud-panel {
        border-color: rgba(255, 50, 50, 0.4);
        background: rgba(20, 0, 0, 0.5);
      }
      #specimen-hud.danger .hud-top-left { border-left-color: rgba(255, 50, 50, 0.9); }
      #specimen-hud.danger .hud-status { color: #f00; text-shadow: 0 0 10px #f00; }
      
    </style>
  </head>
  <body>
    <canvas id="canvas" aria-label="An interactive digital organism" role="img"></canvas>
    
    <div id="specimen-hud">
      <div class="scanlines"></div>
      
      <div class="targeting-ring ring-1"></div>
      <div class="targeting-ring ring-2"></div>

      <div class="hud-panel hud-top-left">
        <div class="hud-title">SPECIMEN /// APEX</div>
        <div id="hud-status" class="hud-status">CONTAINMENT BREACHED</div>
      </div>
      
      <div class="hud-panel hud-top-right">
        <div id="hud-level">MUTATION LEVEL: I</div>
        <div id="hud-mass">BIOMASS: 0.0%</div>
        <div id="hud-temperament">TEMP: NEUTRAL</div>
      </div>
      
      <div class="hud-panel hud-bottom-left">
        <div class="log-header">SYSTEM LOG</div>
        <div id="hud-log" class="hud-log">
          <div>> INITIALIZING NEURAL UPLINK...</div>
          <div>> SYNCING BIOMETRICS...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
